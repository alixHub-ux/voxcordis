name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [backend, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voxcordis_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-debug-info=build/debug_info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxcordis-release
          path: voxcordis_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: voxcordis-debug-info
          path: voxcordis_app/build/debug_info
